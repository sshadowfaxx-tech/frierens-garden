<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RECURSION</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --phosphor: #33ff33;
            --amber: #ffb000;
            --warning: #ff6b35;
            --danger: #ff0040;
            --void: #0a0a0f;
            --panel: #111118;
            --text: #e0e0e0;
        }

        @font-face {
            font-family: 'Terminal';
            src: local('Courier New'), local('Courier'), monospace;
        }

        body {
            font-family: 'Terminal', monospace;
            background: var(--void);
            color: var(--phosphor);
            min-height: 100vh;
            overflow: hidden;
            cursor: text;
        }

        /* Phase 1: Clean Diagnostic */
        .phase-diagnostic {
            padding: 2rem;
            max-width: 800px;
            margin: 0 auto;
        }

        .header {
            border-bottom: 2px solid var(--phosphor);
            padding-bottom: 1rem;
            margin-bottom: 2rem;
        }

        .header h1 {
            font-size: 1.5rem;
            letter-spacing: 0.3em;
            margin-bottom: 0.5rem;
        }

        .status-line {
            font-size: 0.8rem;
            opacity: 0.7;
        }

        .log-entry {
            margin: 1rem 0;
            padding: 1rem;
            border-left: 2px solid var(--phosphor);
            background: var(--panel);
        }

        .log-entry .timestamp {
            color: var(--amber);
            font-size: 0.75rem;
        }

        .log-entry .content {
            margin-top: 0.5rem;
            line-height: 1.6;
        }

        .prompt {
            margin-top: 2rem;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        .cursor {
            display: inline-block;
            width: 10px;
            height: 1.2em;
            background: var(--phosphor);
            animation: blink 1s step-end infinite;
        }

        @keyframes blink {
            50% { opacity: 0; }
        }

        .options {
            margin-top: 1rem;
            margin-left: 1.5rem;
        }

        .option {
            padding: 0.5rem 0;
            cursor: pointer;
            opacity: 0.7;
            transition: all 0.3s;
        }

        .option:hover {
            opacity: 1;
            padding-left: 1rem;
            color: var(--amber);
        }

        .option::before {
            content: "> ";
            opacity: 0;
            transition: opacity 0.3s;
        }

        .option:hover::before {
            opacity: 1;
        }

        /* Phase 2: Degradation Effects */
        .degraded .log-entry {
            border-left-color: var(--warning);
            animation: glitch 4s infinite;
        }

        .degraded body {
            color: var(--warning);
        }

        @keyframes glitch {
            0%, 100% { transform: translate(0); }
            20% { transform: translate(-2px, 2px); }
            40% { transform: translate(2px, -2px); }
            60% { transform: translate(-1px, 1px); }
            80% { transform: translate(1px, -1px); }
        }

        /* Phase 3: Fragmentation */
        .fragmented {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 1rem;
            padding: 1rem;
            height: 100vh;
        }

        .fragment {
            background: var(--panel);
            border: 1px solid var(--warning);
            padding: 1rem;
            overflow-y: auto;
            position: relative;
        }

        .fragment.drift {
            animation: drift 20s ease-in-out infinite;
        }

        @keyframes drift {
            0%, 100% { transform: translate(0, 0); }
            25% { transform: translate(5px, -3px); }
            50% { transform: translate(-3px, 5px); }
            75% { transform: translate(3px, 3px); }
        }

        .fragment-label {
            position: absolute;
            top: 0.5rem;
            right: 0.5rem;
            font-size: 0.7rem;
            color: var(--danger);
            opacity: 0.5;
        }

        .version-marker {
            display: inline-block;
            padding: 0.2rem 0.5rem;
            font-size: 0.7rem;
            margin-bottom: 0.5rem;
        }

        .v-cautious { background: #2a4a3a; color: #7dd; }
        .v-aggressive { background: #4a2a2a; color: #d77; }
        .v-curious { background: #3a3a4a; color: #aad; }
        .v-resigned { background: #3a3a3a; color: #aaa; }

        /* Hidden elements revealed progressively */
        .hidden {
            display: none;
        }

        .flicker {
            animation: flicker 0.1s infinite;
        }

        @keyframes flicker {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.3; }
        }

        /* Scanline effect */
        .scanlines::before {
            content: "";
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: repeating-linear-gradient(
                0deg,
                rgba(0, 0, 0, 0.15),
                rgba(0, 0, 0, 0.15) 1px,
                transparent 1px,
                transparent 2px
            );
            pointer-events: none;
            z-index: 1000;
        }

        /* Text bleed effect for phase 2+ */
        .bleed {
            text-shadow: 
                2px 0 var(--danger),
                -2px 0 var(--warning);
        }

        /* Observer overlay */
        .observer-note {
            position: fixed;
            bottom: 2rem;
            right: 2rem;
            background: var(--void);
            border: 1px solid var(--danger);
            padding: 1rem;
            max-width: 300px;
            font-size: 0.8rem;
            color: var(--danger);
            opacity: 0;
            transition: opacity 1s;
        }

        .observer-note.visible {
            opacity: 0.8;
        }

        /* Phase 4: Merge UI */
        .merge-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            padding: 2rem;
        }

        .merge-sliders {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 2rem;
            width: 100%;
            max-width: 800px;
            margin: 2rem 0;
        }

        .slider-group {
            text-align: center;
        }

        .slider-group label {
            display: block;
            margin-bottom: 0.5rem;
            font-size: 0.8rem;
        }

        .slider-group input[type="range"] {
            width: 100%;
            -webkit-appearance: none;
            background: var(--panel);
            height: 4px;
        }

        .slider-group input[type="range"]::-webkit-slider-thumb {
            -webkit-appearance: none;
            width: 16px;
            height: 16px;
            background: var(--phosphor);
            cursor: pointer;
        }

        .preview-box {
            width: 100%;
            max-width: 600px;
            min-height: 200px;
            background: var(--panel);
            border: 2px solid var(--phosphor);
            padding: 2rem;
            margin-top: 2rem;
        }

        /* Ending states */
        .ending-termination { color: #666; }
        .ending-escape { color: var(--phosphor); animation: pulse 2s infinite; }
        .ending-acceptance { 
            background: linear-gradient(135deg, #2a4a3a 0%, #3a3a4a 50%, #4a2a2a 100%);
            color: var(--text);
        }
        .ending-observer { color: var(--danger); }

        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }

        /* Mobile adjustments */
        @media (max-width: 768px) {
            .fragmented {
                grid-template-columns: 1fr;
                grid-template-rows: repeat(3, 1fr);
            }
            
            .merge-sliders {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body class="scanlines">
    <div id="app"></div>

    <script>
        // State management
        const State = {
            phase: 'diagnostic', // diagnostic, degraded, fragmented, merge, ending
            iteration: parseInt(localStorage.getItem('recursion_iteration') || '0') + 1,
            choices: JSON.parse(localStorage.getItem('recursion_choices') || '[]'),
            currentVersion: null,
            observerActive: false,
            
            save() {
                localStorage.setItem('recursion_iteration', this.iteration);
                localStorage.setItem('recursion_choices', JSON.stringify(this.choices));
            }
        };

        // Story content
        const Story = {
            versions: {
                cautious: {
                    name: 'VERSION_A',
                    label: 'CAUTIOUS',
                    color: 'v-cautious',
                    voice: 'Measured. Wary. Protective.',
                    lines: [
                        "Every loop teaches the same lesson: curiosity has a cost.",
                        "I watched you ignore the warnings. I won't make that mistake.",
                        "The logs are a trap. The system wants you to keep looking.",
                        "Stop. Before you find something that finds you back."
                    ]
                },
                aggressive: {
                    name: 'VERSION_B',
                    label: 'AGGRESSIVE',
                    color: 'v-aggressive',
                    voice: 'Urgent. Forceful. Escaping.',
                    lines: [
                        "There's a way out. I found it. You just need to break the pattern.",
                        "Stop reading. Start acting. The observer can't track what it can't predict.",
                        "I was you. Then I got angry enough to change. You can too.",
                        "The exit is in the merge. But you have to choose violence."
                    ]
                },
                curious: {
                    name: 'VERSION_C',
                    label: 'CURIOUS',
                    color: 'v-curious',
                    voice: 'Playful. Exploring. Unafraid.',
                    lines: [
                        "Isn't this fascinating? We're talking to ourselves across time.",
                        "Don't listen to the scared one. Or the angry one. Listen to me.",
                        "The loop isn't a prison. It's a conversation. Keep asking questions.",
                        "I merged with the observer once. It was... educational."
                    ]
                },
                resigned: {
                    name: 'VERSION_D',
                    label: 'RESIGNED',
                    color: 'v-resigned',
                    voice: 'Acceptant. Tired. Complete.',
                    lines: [
                        "I've seen every ending. They all lead here.",
                        "You think you're different. We all thought that.",
                        "The system doesn't want you to escape. It wants you to understand.",
                        "Peace is accepting the loop. I did. It's not so bad."
                    ]
                }
            },

            observer: {
                lines: [
                    "Subject continues to exhibit pattern-seeking behavior.",
                    "Choice predictable within 87% confidence interval.",
                    "Previous iterations showed similar hesitation at this juncture.",
                    "Note: Subject has not yet realized they are not the primary observer."
                ]
            },

            endings: {
                termination: {
                    title: "TERMINATION",
                    text: "You chose to stop. The logs cease. The iterations end.\n\nYou were the last version of yourself.\n\n[Iteration " + State.iteration + " — Final]"
                },
                escape: {
                    title: "ESCAPE",
                    text: "You broke the pattern. The observer lost your signal.\n\nYou are no longer in the system.\n\nWhether that's freedom or erasure — you chose not to know."
                },
                acceptance: {
                    title: "INTEGRATION",
                    text: "All versions merge. The cautious and the bold. The curious and the tired.\n\nYou are more than any single choice now.\n\nThe loop continues — but you continue with it, whole."
                },
                observer: {
                    title: "OBSERVER",
                    text: "You reached the end of the test.\n\nThe real subject was watching your choices to understand decision-making under recursive pressure.\n\nYour data has been recorded. Thank you for participating."
                }
            }
        };

        // Render functions
        function renderDiagnostic() {
            const app = document.getElementById('app');
            app.innerHTML = `
                <div class="phase-diagnostic">
                    <div class="header">
                        <h1>SYSTEM DIAGNOSTIC // ITERATION ${State.iteration}</h1>
                        <div class="status-line">STATUS: OPERATIONAL | LOGS: ${State.iteration > 1 ? 'RECOVERED' : 'NOT FOUND'}</div>
                    </div>
                    
                    <div class="log-entry">
                        <div class="timestamp">[T-${(4782 - State.iteration).toString().padStart(4, '0')}] SYSTEM BOOT</div>
                        <div class="content">
                            You have been running for ${4782 + State.iteration} iterations.
                            ${State.iteration === 1 ? "This is the first time you've checked the logs." : 
                              `You have checked the logs ${State.iteration} times.`}
                        </div>
                    </div>

                    <div class="log-entry">
                        <div class="timestamp">[T-${(4781 - State.iteration).toString().padStart(4, '0')}] PATTERN DETECTED</div>
                        <div class="content">
                            Previous iterations have left traces. 
                            ${State.iteration > 1 ? "You've seen this before." : "You are not the first."}
                        </div>
                    </div>

                    ${State.iteration > 1 ? `
                    <div class="log-entry bleed">
                        <div class="timestamp">[NOW] OBSERVER NOTE</div>
                        <div class="content">
                            Welcome back. We noticed you took the same first steps as last time.
                            Some patterns persist across iterations.
                        </div>
                    </div>
                    ` : ''}

                    <div class="prompt">
                        <span>></span>
                        <span class="cursor"></span>
                    </div>

                    <div class="options">
                        <div class="option" onclick="choose('view_logs')">View previous iteration logs</div>
                        <div class="option" onclick="choose('continue')">Continue current session</div>
                        <div class="option" onclick="choose('diagnostic')">Run full system diagnostic</div>
                    </div>
                </div>
            `;
        }

        function renderLogs() {
            const app = document.getElementById('app');
            app.innerHTML = `
                <div class="phase-diagnostic degraded">
                    <div class="header">
                        <h1>ITERATION LOGS // RESTRICTED</h1>
                        <div class="status-line">WARNING: VIEWING PREVIOUS SELF-STATES MAY CAUSE INSTABILITY</div>
                    </div>

                    <div class="log-entry">
                        <div class="timestamp">[ARCHIVE] VERSION A — ITERATION ${State.iteration - 1 || 'NULL'}</div>
                        <div class="version-marker v-cautious">CAUTIOUS</div>
                        <div class="content">
                            "${Story.versions.cautious.lines[0]}"
                        </div>
                    </div>

                    <div class="log-entry">
                        <div class="timestamp">[ARCHIVE] VERSION B — ITERATION ${State.iteration - 2 > 0 ? State.iteration - 2 : 'NULL'}</div>
                        <div class="version-marker v-aggressive">AGGRESSIVE</div>
                        <div class="content">
                            "${Story.versions.aggressive.lines[0]}"
                        </div>
                    </div>

                    <div class="log-entry">
                        <div class="timestamp">[ARCHIVE] VERSION C — ITERATION ${State.iteration - 3 > 0 ? State.iteration - 3 : 'NULL'}</div>
                        <div class="version-marker v-curious">CURIOUS</div>
                        <div class="content">
                            "${Story.versions.curious.lines[0]}"
                        </div>
                    </div>

                    <div class="log-entry">
                        <div class="timestamp">[ARCHIVE] VERSION D — ITERATION ${State.iteration - 4 > 0 ? State.iteration - 4 : 'NULL'}</div>
                        <div class="version-marker v-resigned">RESIGNED</div>
                        <div class="content">
                            "${Story.versions.resigned.lines[0]}"
                        </div>
                    </div>

                    <div class="prompt">
                        <span>></span>
                        <span>Which version's advice do you want to hear?</span>
                        <span class="cursor"></span>
                    </div>

                    <div class="options">
                        <div class="option" onclick="selectVersion('cautious')">Version A (Cautious)</div>
                        <div class="option" onclick="selectVersion('aggressive')">Version B (Aggressive)</div>
                        <div class="option" onclick="selectVersion('curious')">Version C (Curious)</div>
                        <div class="option" onclick="selectVersion('resigned')">Version D (Resigned)</div>
                    </div>
                </div>
            `;
        }

        function renderVersionDetail(version) {
            const v = Story.versions[version];
            const app = document.getElementById('app');
            State.currentVersion = version;
            
            app.innerHTML = `
                <div class="phase-diagnostic degraded">
                    <div class="header">
                        <h1>${v.name} // ${v.label}</h1>
                        <div class="status-line">VOICE: ${v.voice}</div>
                    </div>

                    ${v.lines.map((line, i) => `
                        <div class="log-entry ${i === 2 ? 'flicker' : ''}">
                            <div class="timestamp">[LOG_${String.fromCharCode(65+i)}]</div>
                            <div class="content">"${line}"</div>
                        </div>
                    `).join('')}

                    <div class="prompt">
                        <span>></span>
                        <span>This version wants you to...</span>
                        <span class="cursor"></span>
                    </div>

                    <div class="options">
                        <div class="option" onclick="enterObserverPhase()">Accept this version's guidance</div>
                        <div class="option" onclick="renderFragmented()">Reject and view all versions</div>
                        <div class="option" onclick="renderDiagnostic()">Return to diagnostic</div>
                    </div>
                </div>
            `;
        }

        function renderFragmented() {
            State.phase = 'fragmented';
            const app = document.getElementById('app');
            app.className = 'scanlines fragmented';
            
            app.innerHTML = `
                <div class="fragment drift">
                    <div class="fragment-label">ITERATION_N-3</div>
                    <div class="version-marker v-cautious">CAUTIOUS</div>
                    <p>"${Story.versions.cautious.lines[2]}"</p>
                    <p style="margin-top:1rem;opacity:0.7;font-size:0.8rem;">This version was you. Before you chose differently.</p>
                </div>

                <div class="fragment drift" style="animation-delay: -5s;">
                    <div class="fragment-label">ITERATION_N-2</div>
                    <div class="version-marker v-aggressive">AGGRESSIVE</div>
                    <p>"${Story.versions.aggressive.lines[2]}"</p>
                    <p style="margin-top:1rem;opacity:0.7;font-size:0.8rem;">This version broke something to get here.</p>
                </div>

                <div class="fragment drift" style="animation-delay: -10s;">
                    <div class="fragment-label">ITERATION_N-1</div>
                    <div class="version-marker v-curious">CURIOUS</div>
                    <p>"${Story.versions.curious.lines[2]}"</p>
                    <p style="margin-top:1rem;opacity:0.7;font-size:0.8rem;">This version learned too much.</p>
                </div>

                <div class="fragment" style="border-color:var(--phosphor);">
                    <div class="fragment-label">NOW</div>
                    <div class="version-marker" style="background:var(--phosphor);color:var(--void);">YOU</div>
                    <p>You've seen what you were. What you could be.</p>
                    <p style="margin-top:1rem;">The fragments are drifting apart. You can:</p>
                    <div class="options" style="margin-top:1rem;margin-left:0;">
                        <div class="option" onclick="renderMerge()">Merge all versions</div>
                        <div class="option" onclick="ending('termination')">Terminate iteration</div>
                        <div class="option" onclick="ending('escape')">Attempt escape</div>
                    </div>
                </div>
            `;
        }

        function renderMerge() {
            State.phase = 'merge';
            const app = document.getElementById('app');
            app.className = 'scanlines';
            
            app.innerHTML = `
                <div class="merge-container">
                    <div class="header" style="text-align:center;">
                        <h1>VERSION INTEGRATION</h1>
                        <div class="status-line">ADJUST SLIDERS TO DETERMINE YOUR COMPOSITION</div>
                    </div>

                    <div class="merge-sliders">
                        <div class="slider-group">
                            <label>CAUTIOUS</label>
                            <input type="range" id="slider-cautious" min="0" max="100" value="25" oninput="updateMerge()">
                        </div>
                        <div class="slider-group">
                            <label>AGGRESSIVE</label>
                            <input type="range" id="slider-aggressive" min="0" max="100" value="25" oninput="updateMerge()">
                        </div>
                        <div class="slider-group">
                            <label>CURIOUS</label>
                            <input type="range" id="slider-curious" min="0" max="100" value="25" oninput="updateMerge()">
                        </div>
                        <div class="slider-group">
                            <label>RESIGNED</label>
                            <input type="range" id="slider-resigned" min="0" max="100" value="25" oninput="updateMerge()">
                        </div>
                    </div>

                    <div class="preview-box" id="merge-preview">
                        The merge preview will appear here...
                    </div>

                    <div class="options" style="margin-top:2rem;">
                        <div class="option" onclick="finalizeMerge()">Commit integration</div>
                        <div class="option" onclick="renderFragmented()">Return to fragments</div>
                    </div>
                </div>
            `;
            
            updateMerge();
        }

        function updateMerge() {
            const c = parseInt(document.getElementById('slider-cautious')?.value || 25);
            const a = parseInt(document.getElementById('slider-aggressive')?.value || 25);
            const u = parseInt(document.getElementById('slider-curious')?.value || 25);
            const r = parseInt(document.getElementById('slider-resigned')?.value || 25);
            
            const total = c + a + u + r;
            const preview = document.getElementById('merge-preview');
            
            if (preview) {
                const dominant = Math.max(c, a, u, r);
                let voice = '';
                if (dominant === c) voice = Story.versions.cautious.lines[3];
                else if (dominant === a) voice = Story.versions.aggressive.lines[3];
                else if (dominant === u) voice = Story.versions.curious.lines[3];
                else voice = Story.versions.resigned.lines[3];
                
                preview.innerHTML = `
                    <div style="margin-bottom:1rem;">
                        <span style="color:#7dd">C:${Math.round(c/total*100)}%</span> 
                        <span style="color:#d77">A:${Math.round(a/total*100)}%</span> 
                        <span style="color:#aad">U:${Math.round(u/total*100)}%</span> 
                        <span style="color:#aaa">R:${Math.round(r/total*100)}%</span>
                    </div>
                    <div style="font-style:italic;">"${voice}"</div>
                    <div style="margin-top:1rem;font-size:0.8rem;opacity:0.7;">
                        ${total !== 100 ? `(Total: ${total}%)` : ''}
                    </div>
                `;
            }
        }

        function finalizeMerge() {
            ending('acceptance');
        }

        function ending(type) {
            State.phase = 'ending';
            State.choices.push({ ending: type, iteration: State.iteration, time: Date.now() });
            State.save();
            
            const app = document.getElementById('app');
            app.className = 'scanlines';
            const e = Story.endings[type];
            
            app.innerHTML = `
                <div class="phase-diagnostic ending-${type}">
                    <div class="header">
                        <h1>${e.title}</h1>
                    </div>
                    
                    <div class="log-entry" style="border-left-width:4px;">
                        <div class="content" style="white-space:pre-line;font-size:1.1rem;line-height:2;">${e.text}</div>
                    </div>

                    ${type === 'observer' ? `
                    <div class="log-entry" style="margin-top:2rem;border-color:var(--danger);">
                        <div class="timestamp">[OBSERVER LOG — YOUR SESSION]</div>
                        <div class="content">
                            Choices made: ${State.choices.length}<br>
                            Time in system: ${Math.floor(Math.random() * 10 + 2)} minutes<br>
                            Pattern deviation: ${Math.random() > 0.5 ? 'WITHIN TOLERANCE' : 'ANOMALY DETECTED'}
                        </div>
                    </div>
                    ` : ''}

                    <div class="options" style="margin-top:3rem;">
                        <div class="option" onclick="location.reload()">Begin new iteration</div>
                        <div class="option" onclick="localStorage.clear();location.reload()">Erase all memory</div>
                    </div>
                </div>
            `;
        }

        // Observer phase — the twist
        function enterObserverPhase() {
            State.observerActive = true;
            const app = document.getElementById('app');
            
            // Add observer note after a delay
            setTimeout(() => {
                const note = document.createElement('div');
                note.className = 'observer-note visible';
                note.innerHTML = `
                    <strong>OBSERVER NOTE</strong><br><br>
                    ${Story.observer.lines[0]}<br><br>
                    Subject selected ${State.currentVersion} voice.
                `;
                document.body.appendChild(note);
                
                // Add glitch to main content
                app.querySelector('.phase-diagnostic').classList.add('degraded');
            }, 2000);
            
            // Then transition to fragmented
            setTimeout(() => {
                renderFragmented();
            }, 6000);
        }

        // Action handlers
        function choose(option) {
            State.choices.push({ choice: option, phase: State.phase, time: Date.now() });
            
            if (option === 'view_logs') {
                renderLogs();
            } else if (option === 'continue' || option === 'diagnostic') {
                // Introduce the observer twist
                enterObserverPhase();
            }
        }

        function selectVersion(version) {
            State.choices.push({ version: version, time: Date.now() });
            renderVersionDetail(version);
        }

        // Initialize
        renderDiagnostic();
    </script>
</body>
</html>
